<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0d">
<title>Mestre das Velas</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #0a0e0d;
    --panel: #12181a;
    --panel-2: #1a2225;
    --green: #1fc97a;
    --green-dim: #133a2a;
    --red: #ef5350;
    --red-dim: #3a1717;
    --text: #e8edec;
    --text-dim: #8a9b9a;
    --accent: #f5c542;
    --border: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    height: 100%;
    overflow-x: hidden;
  }
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ===== Top bar ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 20;
  }
  .topbar .back {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; background: transparent; border: none; color: var(--text);
    font-size: 20px; cursor: pointer;
  }
  .topbar .back:active { background: var(--panel-2); }
  .topbar .title { font-size: 17px; font-weight: 600; }
  .topbar .rodada { font-size: 14px; color: var(--text-dim); display:flex; align-items:center; gap:6px;}
  .topbar .rodada b { color: var(--text); font-size: 16px; }
  .topbar .reset {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; background: transparent; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer;
  }

  /* ===== Home screen ===== */
  .home { padding: 32px 20px; text-align: center; flex: 1; display:flex; flex-direction:column; }
  .home-icon {
    width: 88px; height: 88px; margin: 8px auto 20px;
    border-radius: 22px; background: var(--green-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
  }
  .home h1 { font-size: 32px; margin: 0 0 12px; font-weight: 800; letter-spacing: -0.5px; }
  .home h1 span { color: var(--green); }
  .home p.sub { color: var(--text-dim); font-size: 15px; line-height: 1.5; margin: 0 0 28px; }
  .stats-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .stat .num { font-size: 22px; font-weight: 800; }
  .stat .lbl { font-size: 12px; color: var(--text-dim); }
  .stat.padroes .num { color: var(--text); }
  .stat.alta .num { color: var(--green); }
  .stat.baixa .num { color: var(--red); }

  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--green); color: #06291a; font-weight: 700; font-size: 17px;
    border: none; border-radius: 14px; padding: 16px; cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-secondary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--panel-2); color: var(--text); font-weight: 600; font-size: 15px;
    border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-primary:active, .btn-secondary:active { opacity: 0.8; }

  .home-bars {
    margin-top: auto; height: 80px; display: flex; align-items: flex-end; gap: 6px;
    justify-content: center; opacity: 0.35; padding-top: 24px;
  }
  .home-bars .bar { width: 14px; border-radius: 3px 3px 0 0; }
  .home-bars .bar.g { background: var(--green); }
  .home-bars .bar.r { background: var(--red); }

  /* ===== Difficulty / filter screen ===== */
  .filters-row {
    display: flex; gap: 8px; padding: 14px 16px 8px; flex-wrap: wrap;
  }
  .chip {
    padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 600;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim);
    display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap;
  }
  .chip.active.todos { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .chip.active.iniciante { background: rgba(140,200,90,0.15); color: #8cc85a; border-color: #8cc85a; }
  .chip.active.intermediario { background: rgba(245,197,66,0.15); color: var(--accent); border-color: var(--accent); }
  .chip.active.avancado { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .chip.active.expert { background: rgba(180,160,255,0.15); color: #b4a0ff; border-color: #b4a0ff; }

  .score-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; margin: 8px 16px; border-radius: 12px;
    background: var(--panel-2); font-size: 14px;
  }
  .score-bar .left { display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
  .score-bar .left b { color: var(--text); }
  .score-bar .right { display: flex; gap: 16px; color: var(--text-dim); font-size: 14px; }

  /* ===== Question / chart card ===== */
  .question-card {
    margin: 8px 16px 16px; padding: 20px 16px; border-radius: 16px;
    background: var(--panel-2); border: 1px solid var(--border);
  }
  .question-card h2 { font-size: 16px; color: var(--text-dim); margin: 0 0 16px; font-weight: 500; }
  .chart-wrap { display: flex; }
  .chart-axis {
    display: flex; flex-direction: column; justify-content: space-between;
    font-size: 12px; color: var(--text-dim); padding-right: 8px; text-align: right;
    min-width: 38px; font-family: 'Courier New', monospace;
  }
  .chart-svg-wrap { flex: 1; position: relative; }
  .chart-svg-wrap svg { width: 100%; display: block; }
  .grid-line { stroke: var(--border); stroke-dasharray: 4 4; stroke-width: 1; }

  /* ===== Answer options ===== */
  .options { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    border-radius: 14px; border: 1px solid var(--border); background: var(--panel-2);
    color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; text-align: left;
  }
  .option-btn .ic { font-size: 20px; }
  .option-btn:active { background: #20292c; }
  .option-btn.correct { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .option-btn.wrong { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .option-btn[disabled] { cursor: default; }

  /* ===== Feedback panel ===== */
  .feedback {
    margin: 16px 16px; padding: 20px; border-radius: 16px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .feedback.correto { background: rgba(31,201,122,0.08); border: 1px solid rgba(31,201,122,0.3); }
  .feedback.errado { background: rgba(239,83,80,0.08); border: 1px solid rgba(239,83,80,0.3); }
  .feedback-head { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 800; margin-bottom: 4px; }
  .feedback.correto .feedback-head { color: var(--green); }
  .feedback.errado .feedback-head { color: var(--red); }
  .feedback-sub { color: var(--text-dim); font-size: 15px; margin: 0 0 16px; padding-left: 32px; }
  .feedback-sub b { color: var(--text); }
  .info-box {
    background: rgba(0,0,0,0.25); border-radius: 12px; padding: 14px; margin-bottom: 12px;
  }
  .info-box .lbl { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .info-box.dica .lbl { color: var(--accent); }
  .info-box.why .lbl { color: var(--green); }
  .info-box p { margin: 0; font-size: 14.5px; line-height: 1.5; color: var(--text); }

  .next-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer; margin: 4px 16px 24px;
  }
  .next-btn.correto { background: var(--green); color: #06291a; }
  .next-btn.errado { background: var(--red); color: #2a0a0a; }

  /* ===== Difficulty select home extra ===== */
  .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 16px; }
  .diff-card {
    padding: 14px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
  }
  .diff-card .ic { font-size: 22px; }
  .diff-card.sel { border-color: var(--accent); color: var(--accent); background: rgba(245,197,66,0.08); }

  /* ===== Toast install ===== */
  .install-toast {
    position: fixed; bottom: 16px; left: 16px; right: 16px;
    background: var(--panel-2); border: 1px solid var(--green);
    border-radius: 14px; padding: 14px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .install-toast span { font-size: 14px; }
  .install-toast button {
    background: var(--green); color: #06291a; border: none; border-radius: 8px;
    padding: 8px 14px; font-weight: 700; font-size: 13px; cursor: pointer; flex-shrink: 0;
  }
  .install-toast .close { background: transparent; color: var(--text-dim); padding: 4px; font-size: 18px; }

  .end-screen { padding: 40px 20px; text-align: center; }
  .end-screen .big-num { font-size: 56px; font-weight: 800; color: var(--green); margin: 16px 0 4px; }
  .end-screen .label { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }

  /* ===== Library (Biblioteca) ===== */
  .lib-search {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); font-size: 15px; outline: none;
  }
  .lib-search::placeholder { color: var(--text-dim); }

  .lib-list { padding: 8px 16px 32px; display: flex; flex-direction: column; gap: 10px; }
  .lib-card {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    border-radius: 14px; background: var(--panel-2); border: 1px solid var(--border);
    cursor: pointer;
  }
  .lib-card:active { background: #20292c; }
  .lib-card-chart {
    flex-shrink: 0; width: 64px; height: 44px; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden;
  }
  .lib-card-chart svg { width: 100%; height: 100%; display: block; }
  .lib-card-info { flex: 1; min-width: 0; }
  .lib-card-name { font-size: 14.5px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .lib-card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .lib-card-arrow { color: var(--text-dim); font-size: 22px; flex-shrink: 0; }

  .lib-tag {
    font-size: 11.5px; font-weight: 700; padding: 4px 9px; border-radius: 999px;
    white-space: nowrap;
  }
  .lib-tag.sinal-alta { background: var(--green-dim); color: var(--green); }
  .lib-tag.sinal-baixa { background: var(--red-dim); color: var(--red); }
  .lib-tag.sinal-indecisao { background: rgba(245,197,66,0.15); color: var(--accent); }

  .lib-tag.dif-iniciante { background: rgba(140,200,90,0.15); color: #8cc85a; }
  .lib-tag.dif-intermediario { background: rgba(245,197,66,0.15); color: var(--accent); }
  .lib-tag.dif-avancado { background: var(--red-dim); color: var(--red); }
  .lib-tag.dif-expert { background: rgba(180,160,255,0.15); color: #b4a0ff; }
  .lib-tag.dif-todos { background: var(--green-dim); color: var(--green); }
</style>
</head>
<body>
<div id="app"></div>

<script src="patterns.js"></script>
<script src="app.js"></script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Ativo!'))
            .catch(err => console.log('Erro no Service Worker:', err));
    }
</script></body>
</html>
